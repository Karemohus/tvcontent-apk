name: Build TV Content APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: '8.4'

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk TVContent-v1.0.0.apk
        ls -lh TVContent-v1.0.0.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: TVContent-APK
        path: TVContent-v1.0.0.apk
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-build-${{ github.run_number }}
        name: TV Content APK v1.0.0 (Build ${{ github.run_number }})
        body: |
          # TV Content APK Build ${{ github.run_number }}

          ## Features
          - WebView-based Digital Signage player
          - Auto-start on device boot
          - Fullscreen kiosk mode
          - Offline caching
          - Auto-recovery on errors
          - Settings: tap logo 10 times + PIN 9999

          ## Default Server
          https://aljabr.duckdns.org/

          ## Installation
          1. Enable "Unknown sources" in Android
          2. Download TVContent-v1.0.0.apk below
          3. Install and open
